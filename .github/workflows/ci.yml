name: ci

on:
  push:
  pull_request:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    env:
      FIADOC_CACHE_DIR: ${{ github.workspace }}/.fiadoc-cache

    name: Tests on python ${{ matrix.python-version }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "requirements-dev.txt"

      - name: Restore FIA PDFs cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.FIADOC_CACHE_DIR }}
          key: fiadoc-pdfs-${{ runner.os }}-dummy  # Dummy key to always miss, so can fall back to
          restore-keys: |                          # the lastest cache in restore-keys
            fiadoc-pdfs-${{ runner.os }}-

      - name: Hash PDFs already in cache
        id: hash-before
        run: |
          HASH=$(ls -1 "$FIADOC_CACHE_DIR/downloads" 2>/dev/null | sort | sha256sum | cut -d' ' -f1 || echo "empty")
          echo "before=$HASH" >> "$GITHUB_OUTPUT"

      - name: Install fia-doc
        run: |
          python -m pip install .

      - name: Install extra dependencies for testing (w/o xdist)
        run: |
          grep -v 'pytest-xdist' requirements-dev.txt | python -m pip install -r /dev/stdin

      - name: Run tests
        run: |
          pytest fiadoc

      - name: Linting
        run: ruff check --output-format=github .

      - name: Hash PDFs after tests
        if: always()
        id: hash-after
        run: |
          HASH=$(ls -1 "$FIADOC_CACHE_DIR/downloads" 2>/dev/null | sort | sha256sum | cut -d' ' -f1 || echo "empty")
          echo "after=$HASH" >> "$GITHUB_OUTPUT"

      - name: Save FIA PDFs cache
        if: always() && github.event_name == 'push' && steps.hash-before.outputs.before != steps.hash-after.outputs.after
        uses: actions/cache/save@v5
        with:
          path: ${{ env.FIADOC_CACHE_DIR }}
          key: fiadoc-pdfs-${{ runner.os }}-${{ steps.hash-after.outputs.after }}
